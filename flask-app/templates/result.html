<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }

        h1 {
            color: #1f3c88;
        }

        pre {
            background: #111;
            color: #00ff66;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            white-space: pre-wrap;
            font-size: 14px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background: #1f3c88;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
        }

        a:hover {
            background: #162d66;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>{{ title }}</h1>

    <pre>{{ output }}</pre>

    <a href="/">Back to Home</a>
</div>
</body>
</html>
