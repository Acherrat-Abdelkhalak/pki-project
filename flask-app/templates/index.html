<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PKI Management Interface</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 85%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #1f3c88;
        }

        h2 {
            color: #333;
            border-bottom: 1px solid #ddd;
            padding-bottom: 8px;
        }

        form {
            margin: 10px 0;
        }

        button {
            background: #1f3c88;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #162d66;
        }

        .note {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Three-Level PKI Management Interface</h1>

    <div class="note">
        Educational interface for managing a three-level PKI: Root CA, Intermediate CA, and Leaf Certificate.
    </div>

    <h2>1. View Certificates</h2>

    <form action="/view-root" method="post">
        <button type="submit">View Root CA Certificate</button>
    </form>

    <form action="/view-intermediate" method="post">
        <button type="submit">View Intermediate CA Certificate</button>
    </form>

    <form action="/view-server" method="post">
        <button type="submit">View Server Certificate</button>
    </form>

    <h2>2. Verification</h2>

    <form action="/verify-chain" method="post">
        <button type="submit">Verify Certificate Chain</button>
    </form>

    <form action="/verify-crl" method="post">
        <button type="submit">Verify Certificate with CRL</button>
    </form>

    <h2>3. Revocation and Database</h2>

    <form action="/view-crl" method="post">
        <button type="submit">View CRL</button>
    </form>

    <form action="/view-database" method="post">
        <button type="submit">View Intermediate CA Database</button>
    </form>

    <h2>4. Advanced Tests and Security</h2>

    <form action="/security-audit" method="post">
        <button type="submit">Run Security Audit</button>
    </form>

    <form action="/certificate-status" method="post">
        <button type="submit">Show Certificate Status Report</button>
    </form>

    <form action="/performance-test" method="post">
        <button type="submit">Run Performance Test</button>
    </form>

</div>
</body>
</html>
